services:
  - type: web
    name: bedr-api
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn bedr.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # You can override ALLOWED_HOSTS safely here:
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Insert your PostgreSQL variables internally attached or mapped out:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      # Map to your precise frontend build endpoint when deployed:
      - key: FRONTEND_URL
        sync: false
